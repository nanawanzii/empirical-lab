<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Game-based empirical economics training for causal inference, panel data, data acquisition, and research workflows." />
    <meta name="theme-color" content="#0A0A0A" />
    <title>Empirical Lab</title>
    <!-- Fonts loaded via @font-face in styles.css (Maple Mono, Anthropic Serif) -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <svg class="noise-svg" aria-hidden="true" width="100%" height="100%">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#noise)" opacity="0.04"/>
    </svg>
    <button class="skip-link" type="button" onclick="document.getElementById('app').focus()">Skip to main content</button>
    <div id="app" tabindex="-1"></div>
    <script src="app.js"></script>
  </body>
</html>
